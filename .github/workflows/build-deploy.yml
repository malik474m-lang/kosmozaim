name: Build Kosmozaim

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: kosmozaim
        ports:
          - 3306:3306
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=3

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create MySQL tables
        run: |
          mysql -h 127.0.0.1 -u root -proot kosmozaim << 'SQL'
          CREATE TABLE offers (id INT AUTO_INCREMENT PRIMARY KEY, title VARCHAR(255) NOT NULL, slug VARCHAR(255) NOT NULL UNIQUE, category ENUM('microloans','credits','credit_cards','debit_cards') NOT NULL, amount_min INT NOT NULL DEFAULT 1000, amount_max INT NOT NULL DEFAULT 100000, term_min_days INT NOT NULL DEFAULT 1, term_max_days INT NOT NULL DEFAULT 365, psk DECIMAL(6,2) NOT NULL DEFAULT 0, rate DECIMAL(6,2) NOT NULL DEFAULT 0, free_term_days INT NOT NULL DEFAULT 0, logo_url TEXT, affiliate_url TEXT NOT NULL, borrower_category ENUM('employed','unemployed','pensioner','student','self_employed','any') NOT NULL DEFAULT 'any', description TEXT, seo_keywords TEXT, regions TEXT, rating DECIMAL(3,1) NOT NULL DEFAULT 0, review_count INT NOT NULL DEFAULT 0, is_active BOOLEAN NOT NULL DEFAULT TRUE, sort_order INT NOT NULL DEFAULT 0, created_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP, updated_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP ON UPDATE CURRENT_TIMESTAMP) ENGINE=InnoDB DEFAULT CHARSET=utf8mb4;
          CREATE TABLE articles (id INT AUTO_INCREMENT PRIMARY KEY, title VARCHAR(500) NOT NULL, slug VARCHAR(500) NOT NULL UNIQUE, excerpt TEXT, content TEXT NOT NULL, meta_title VARCHAR(255), meta_description TEXT, cover_image TEXT, is_published BOOLEAN NOT NULL DEFAULT FALSE, created_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP, updated_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP ON UPDATE CURRENT_TIMESTAMP) ENGINE=InnoDB DEFAULT CHARSET=utf8mb4;
          CREATE TABLE admin_users (id INT AUTO_INCREMENT PRIMARY KEY, username VARCHAR(100) NOT NULL UNIQUE, password_hash VARCHAR(255) NOT NULL, created_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP) ENGINE=InnoDB DEFAULT CHARSET=utf8mb4;
          CREATE TABLE click_stats (id INT AUTO_INCREMENT PRIMARY KEY, offer_id INT NOT NULL, clicked_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP, user_agent TEXT, referer TEXT) ENGINE=InnoDB DEFAULT CHARSET=utf8mb4;
          CREATE TABLE subscribers (id INT AUTO_INCREMENT PRIMARY KEY, email VARCHAR(255) NOT NULL UNIQUE, is_active BOOLEAN NOT NULL DEFAULT TRUE, subscribed_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP) ENGINE=InnoDB DEFAULT CHARSET=utf8mb4;
          CREATE TABLE reviews (id INT AUTO_INCREMENT PRIMARY KEY, offer_id INT NOT NULL, author_name VARCHAR(100) NOT NULL, rating INT NOT NULL DEFAULT 5, comment TEXT NOT NULL, is_approved BOOLEAN NOT NULL DEFAULT FALSE, created_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP) ENGINE=InnoDB DEFAULT CHARSET=utf8mb4;
                    CREATE TABLE geo_redirects (id INT AUTO_INCREMENT PRIMARY KEY, country_code VARCHAR(10) NOT NULL, country_name VARCHAR(100) NOT NULL DEFAULT '', redirect_url TEXT NOT NULL, is_active BOOLEAN NOT NULL DEFAULT TRUE, created_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP) ENGINE=InnoDB DEFAULT CHARSET=utf8mb4;
          SQL

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Create .env for build
        run: |
          echo "DATABASE_URL=mysql://root:root@127.0.0.1:3306/kosmozaim" > .env
          echo "NEXT_PUBLIC_SITE_URL=https://kosmozaim.ru" >> .env
          echo "NEXT_PUBLIC_YANDEX_METRIKA_ID=${{ secrets.YANDEX_METRIKA_ID }}" >> .env
          echo "NEXT_PUBLIC_GOOGLE_ANALYTICS_ID=${{ secrets.GOOGLE_ANALYTICS_ID }}" >> .env

      - name: Build Next.js
        run: npm run build

      - name: Package build
        run: tar -czf next-build.tar.gz .next public package.json package-lock.json next.config.ts app.js

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: next-build
          path: next-build.tar.gz
          retention-days: 7
